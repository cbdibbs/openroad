name: Pull Request CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Godot
        run: zsh tools/ci/install_godot_macos.sh

      - name: Run full CI suite
        id: ci
        continue-on-error: true
        run: python3 tools/ci/run_ci_suite.py --output work/ci/pr-summary.json

      - name: Render CI summary markdown
        if: always()
        run: python3 tools/ci/render_ci_comment.py work/ci/pr-summary.json --output work/ci/pr-comment.md

      - name: Publish job summary
        if: always()
        run: cat work/ci/pr-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-ci-results
          path: work/ci
          if-no-files-found: error

      - name: Upsert pull request comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('work/ci/pr-comment.md', 'utf8');
            const marker = '<!-- procedural-trainer-ci-comment -->';
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Fail when validation failed
        if: steps.ci.outcome == 'failure'
        run: exit 1
