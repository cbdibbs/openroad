name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref_name == 'main' && github.actor != 'github-actions[bot]' && (github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]'))
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: python3 -m pip install --upgrade 'python-semantic-release>=10,<11'

      - name: Install Godot
        run: zsh tools/ci/install_godot_macos.sh

      - name: Run release validation suite
        run: python3 tools/ci/run_ci_suite.py --output work/ci/release-summary.json

      - name: Render release validation summary
        run: python3 tools/ci/render_ci_comment.py work/ci/release-summary.json --output work/ci/release-summary.md

      - name: Publish job summary
        run: cat work/ci/release-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Determine next release version
        id: next
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          print(data['project']['version'])
          PY
          )
          NEXT_VERSION=$(semantic-release version --print)
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$NEXT_VERSION" == "$CURRENT_VERSION" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create semantic release
        if: steps.next.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version

      - name: Stamp export preset version
        if: steps.next.outputs.should_release == 'true'
        run: python3 tools/ci/set_export_version.py --version "${{ steps.next.outputs.next_version }}"

      - name: Export macOS app
        if: steps.next.outputs.should_release == 'true'
        run: |
          mkdir -p "$RUNNER_TEMP/godot-export"
          "$GODOT_BIN" --headless --path game-client/godot --export-release "macOS" "$RUNNER_TEMP/godot-export/Procedural Trainer.app"

      - name: Package release artifacts
        if: steps.next.outputs.should_release == 'true'
        run: python3 tools/ci/package_release.py --version "${{ steps.next.outputs.next_version }}" --macos-app "$RUNNER_TEMP/godot-export/Procedural Trainer.app" --output-dir dist

      - name: Upload release assets to GitHub Release
        if: steps.next.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish --tag "v${{ steps.next.outputs.next_version }}"

      - name: Upload release workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-release-results
          path: |
            work/ci
            dist
          if-no-files-found: ignore

      - name: Note skipped release
        if: steps.next.outputs.should_release != 'true'
        run: echo "No semantic version bump detected on this push." >> "$GITHUB_STEP_SUMMARY"
